services:
  hermes:
    image: nix-for-hermes:0.18.2
    container_name: hermes
    restart: unless-stopped
    # The entrypoint starts as root to fix bind-mount permissions, then services run as uid/gid 10000.
    user: "0:0"
    ports:
      - "8642:8642"
      - "9119:9119"
    env_file:
      - path: ./hermes.env
        required: false
    environment:
      HTTP_PROXY: "http://example.com"
      HTTPS_PROXY: "http://example.com"
      ALL_PROXY: "http://example.com"
      NO_PROXY: "127.0.0.1,localhost,::1"
      http_proxy: "http://example.com"
      https_proxy: "http://example.com"
      all_proxy: "http://example.com"
      no_proxy: "127.0.0.1,localhost,::1"
    volumes:
      # The entrypoint repairs /data and /home/hermes permissions before services drop to uid/gid 10000.
      - ./data:/data
      - ./home:/home/hermes
